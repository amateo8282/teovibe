# TeoVibe Kamal 배포 설정
service: teovibe

image: teojay/teovibe

# Hetzner VPS
servers:
  web:
    - 5.78.179.202
  # job:
  #   hosts:
  #     - 5.78.179.202
  #   cmd: bin/jobs

# 프록시 설정
proxy:
  ssl: true
  host: jaeho.im

# Docker Hub
registry:
  username: teojay
  password:
    - KAMAL_REGISTRY_PASSWORD

# 환경변수
env:
  secret:
    - RAILS_MASTER_KEY
  clear:
    SOLID_QUEUE_IN_PUMA: true
    WEB_CONCURRENCY: 2
    RAILS_LOG_LEVEL: info

# 별칭
aliases:
  console: app exec --interactive --reuse "bin/rails console"
  shell: app exec --interactive --reuse "bash"
  logs: app logs -f
  dbc: app exec --interactive --reuse "bin/rails dbconsole --include-password"

# SQLite 영구 스토리지
volumes:
  - "teovibe_storage:/rails/storage"

# 에셋 브릿지
asset_path: /rails/public/assets

# 빌드 설정 — 로컬 Docker 없이 서버에서 원격 빌드
builder:
  arch: amd64
  remote: ssh://root@5.78.179.202

# SSH 설정
ssh:
  user: root
